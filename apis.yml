aid: follow-up-boss
name: Follow Up Boss
description: >-
  Follow Up Boss is a real estate CRM and lead management platform helping
  agents and teams capture leads from any source, automate follow-up via
  texts, emails, and calls, manage pipelines and deals, and track team
  performance. The Follow Up Boss REST API exposes resources such as people,
  notes, tasks, deals, calls, text messages, events, and webhooks, secured
  with HTTP Basic authentication using an API key obtained from the
  application's admin settings.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Real Estate
  - CRM
  - Lead Management
  - Sales Automation
  - Follow Up
  - Pipeline Management
url: >-
  https://raw.githubusercontent.com/api-evangelist/follow-up-boss/refs/heads/main/apis.yml
created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: follow-up-boss:rest-api
    name: Follow Up Boss API
    description: >-
      REST API for managing real estate leads, contacts, deals, notes, tasks,
      calls, text messages, events, and webhooks in Follow Up Boss.
      Authenticated with HTTP Basic using an API key issued from the Follow
      Up Boss admin settings. HTTPS is required for all requests.
    humanURL: https://docs.followupboss.com
    baseURL: https://api.followupboss.com/v1
    tags:
